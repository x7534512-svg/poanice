<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA5rnOR4jMrRYnOjHV9P2YRGocJC-PFfYU",
        authDomain: "poanice-7e1aa.firebaseapp.com",
        databaseURL: "https://poanice-7e1aa-default-rtdb.firebaseio.com",
        projectId: "poanice-7e1aa",
        storageBucket: "poanice-7e1aa.firebasestorage.app",
        messagingSenderId: "569445722586",
        appId: "1:569445722586:web:e9d256b7ab5300db40f8e3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'feedbacks');

    // 管理員密碼與狀態檢查
    const ADMIN_PASSWORD = "8888"; 
    // 從瀏覽器暫存中讀取登入狀態
    let isAdminAuthenticated = sessionStorage.getItem('isAdmin') === 'true';

    // 初始化開關狀態
    const toggle = document.getElementById('adminToggle');
    toggle.checked = isAdminAuthenticated;

    // 1. 送出留言
    document.getElementById('sendBtn').onclick = () => {
        const input = document.getElementById('msgInput');
        if (!input.value.trim()) return;
        
        push(dbRef, {
            content: input.value,
            time: new Date().toLocaleString('zh-TW', { hour12: false }),
            reply: ""
        });
        input.value = "";
    };

    // 2. 監聽更新
    onValue(dbRef, (snapshot) => {
        const displayArea = document.getElementById('displayArea');
        displayArea.innerHTML = "";
        const data = snapshot.val();

        if (data) {
            const sortedItems = Object.entries(data).reverse();
            sortedItems.forEach(([id, val]) => {
                const isReplied = val.reply !== "";
                const replyHtml = isReplied 
                    ? `<div class="admin-box"><strong>管理員回覆：</strong> ${val.reply}</div>` 
                    : `<div class="mt-2 text-muted small">⏳ 受理中...</div>`;

                const adminBtns = isAdminAuthenticated 
                    ? `<div class="mt-3 text-end">
                        <button class="btn btn-sm btn-success me-2" onclick="replyMsg('${id}')">回覆</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteMsg('${id}')">刪除</button>
                       </div>` 
                    : "";

                displayArea.innerHTML += `
                    <div class="feedback-item ${isReplied ? 'replied' : ''}">
                        <div class="time-tag d-flex justify-content-between">
                            <span>${val.time}</span>
                            <span><span class="status-dot" style="background:${isReplied ? '#27ae60' : '#f1c40f'}"></span>${isReplied ? '已處理' : '待處理'}</span>
                        </div>
                        <div style="font-size: 1.1rem; line-height: 1.6;">${val.content}</div>
                        ${replyHtml}
                        ${adminBtns}
                    </div>
                `;
            });
        } else {
            displayArea.innerHTML = '<div class="text-center py-5">目前沒有反應事項</div>';
        }
    });

    // 3. 管理模式切換邏輯 (修正版)
    toggle.onchange = (e) => {
        if (e.target.checked) {
            const pwd = prompt("請輸入管理員密碼：");
            if (pwd === ADMIN_PASSWORD) {
                sessionStorage.setItem('isAdmin', 'true');
                isAdminAuthenticated = true;
                alert("已開啟管理模式");
                location.reload(); // 重新整理以載入按鈕
            } else {
                alert("密碼錯誤！");
                e.target.checked = false;
            }
        } else {
            sessionStorage.removeItem('isAdmin');
            isAdminAuthenticated = false;
            location.reload();
        }
    };

    // 4. 管理功能
    window.replyMsg = (id) => {
        const text = prompt("請輸入回覆內容：");
        if (text) update(ref(db, `feedbacks/${id}`), { reply: text });
    };

    window.deleteMsg = (id) => {
        if (confirm("確定刪除這條反應事項嗎？")) remove(ref(db, `feedbacks/${id}`));
    };
</script>
